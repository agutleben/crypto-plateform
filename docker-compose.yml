services:

  # ─── Kafka (KRaft, image officielle Apache) ─────────────────────
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 2
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Kafka UI ────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  spark-master:
    build: ./spark
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8081:8080"
    environment:
      SPARK_MASTER_HOST: spark-master
      GCP_PROJECT: crypto-platform-dev-490610
      BQ_DATASET_RAW: crypto_raw
      GCS_BUCKET: crypto-platform-temp-490610
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      - ./secrets/gcp-credentials.json:/tmp/gcp-credentials.json:ro

  spark-worker:
    build: ./spark
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 3g
      SPARK_WORKER_CORES: 2
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    depends_on:
      - spark-master
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      - ./secrets/gcp-credentials.json:/tmp/gcp-credentials.json:ro


  spark-submit:
    build: ./spark
    container_name: spark-submit
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      /opt/spark-jobs/streaming.py
    environment:
      GCP_PROJECT: ${GCP_PROJECT}
      BQ_DATASET_RAW: ${BQ_DATASET_RAW}
      GCS_BUCKET: ${GCS_BUCKET}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    volumes:
      - ./spark/jobs:/opt/spark-jobs
      - ./secrets/gcp-credentials.json:/tmp/gcp-credentials.json:ro
    depends_on:
      - spark-master
      - spark-worker
      - kafka
    restart: unless-stopped

  # ─── Dbt ────────────────────────────────────
  dbt:
    image: ghcr.io/dbt-labs/dbt-bigquery:1.8.0
    container_name: dbt
    volumes:
      - ./dbt/crypto_platform:/usr/app/dbt
      - ./secrets/gcp-credentials.json:/tmp/gcp-credentials.json:ro
    environment:
      GCP_PROJECT: ${GCP_PROJECT}
      BQ_DATASET_RAW: ${BQ_DATASET_RAW}
      BQ_DATASET_MART: ${BQ_DATASET_MART}
      BQ_LOCATION: ${BQ_LOCATION}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    working_dir: /usr/app/dbt
    entrypoint: ["tail", "-f", "/dev/null"]

  # ─── Producer Binance → Kafka ────────────────────────────────────
  producer:
    build: ./producer
    container_name: producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW: crypto.raw.trades
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Airflow ────────────────────────────────────
  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    command: airflow webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: crypto-platform-secret
      GCP_PROJECT: ${GCP_PROJECT}
      BQ_DATASET_RAW: ${BQ_DATASET_RAW}
      BQ_DATASET_MART: ${BQ_DATASET_MART}
      BQ_LOCATION: ${BQ_LOCATION}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - dbt_data:/opt/airflow/dbt
      - ./secrets/gcp-credentials.json:/tmp/gcp-credentials.json:ro
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: crypto-platform-secret
      GCP_PROJECT: ${GCP_PROJECT}
      BQ_DATASET_RAW: ${BQ_DATASET_RAW}
      BQ_DATASET_MART: ${BQ_DATASET_MART}
      BQ_LOCATION: ${BQ_LOCATION}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - dbt_data:/opt/airflow/dbt
      - ./secrets/gcp-credentials.json:/tmp/gcp-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    build: ./airflow
    container_name: airflow-init
    entrypoint: ["/bin/bash", "/init.sh"]
    command: []
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: crypto-platform-secret
    volumes:
      - ./dbt/crypto_platform:/opt/dbt-source:ro
      - dbt_data:/opt/airflow/dbt
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Postgres ────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API ────────────────────────────────────
  api:
    build: ./api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      GCP_PROJECT: ${GCP_PROJECT}
      BQ_DATASET_MART: ${BQ_DATASET_MART}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    volumes:
      - ./secrets/gcp-credentials.json:/tmp/gcp-credentials.json:ro
    restart: unless-stopped
volumes:
  kafka_data:
  airflow_data:
  postgres_data:
  dbt_data:

