name: CI/CD — Crypto Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────
  lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check api/ producer/

  # ── 2. dbt tests ──────────────────────────────────────────────
  dbt-tests:
    name: dbt compile & test
    runs-on: ubuntu-latest
    needs: lint
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dbt
        run: pip install dbt-bigquery==1.8.0
      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-credentials.json
      - name: dbt debug
        working-directory: dbt/crypto_platform
        run: dbt debug --profiles-dir .
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_DATASET_RAW: ${{ vars.BQ_DATASET_RAW }}
          BQ_DATASET_MART: ${{ vars.BQ_DATASET_MART }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
      - name: dbt compile
        working-directory: dbt/crypto_platform
        run: dbt compile --profiles-dir .
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_DATASET_RAW: ${{ vars.BQ_DATASET_RAW }}
          BQ_DATASET_MART: ${{ vars.BQ_DATASET_MART }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json

  # ── 3. Build & Push Docker images ─────────────────────────────
  build-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    needs: dbt-tests
    environment: prod
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-api:${{ github.sha }}

      - name: Build & Push Producer
        uses: docker/build-push-action@v5
        with:
          context: ./producer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-producer:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-producer:${{ github.sha }}

      - name: Build & Push Spark
        uses: docker/build-push-action@v5
        with:
          context: ./spark
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-spark:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-spark:${{ github.sha }}

      - name: Build & Push Airflow
        uses: docker/build-push-action@v5
        with:
          context: ./airflow
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-airflow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crypto-airflow:${{ github.sha }}

  # ── 4. Deploy VPS ─────────────────────────────────────────────
  deploy:
    name: Deploy VPS
    runs-on: ubuntu-latest
    needs: build-push
    environment: prod
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy sur VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GCP_PROJECT,BQ_DATASET_RAW,BQ_DATASET_MART,GCS_BUCKET,BQ_LOCATION,AIRFLOW_SECRET_KEY,AIRFLOW_ADMIN_PASSWORD,DOCKERHUB_USERNAME,GCP_SA_KEY,DOCKERHUB_TOKEN
          script: |
            cd /opt/crypto-platform
            git pull origin main

            mkdir -p /opt/crypto-platform/secrets
            echo "$GCP_SA_KEY" > /opt/crypto-platform/secrets/gcp-credentials.json

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            export GCP_PROJECT=$GCP_PROJECT
            export BQ_DATASET_RAW=$BQ_DATASET_RAW
            export BQ_DATASET_MART=$BQ_DATASET_MART
            export GCS_BUCKET=$GCS_BUCKET
            export BQ_LOCATION=$BQ_LOCATION
            export AIRFLOW_SECRET_KEY=$AIRFLOW_SECRET_KEY
            export AIRFLOW_ADMIN_PASSWORD=$AIRFLOW_ADMIN_PASSWORD
            export DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-credentials.json

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            echo "✅ Deploy terminé"
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_DATASET_RAW: ${{ vars.BQ_DATASET_RAW }}
          BQ_DATASET_MART: ${{ vars.BQ_DATASET_MART }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          BQ_LOCATION: ${{ vars.BQ_LOCATION }}
          AIRFLOW_SECRET_KEY: ${{ secrets.AIRFLOW_SECRET_KEY }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}